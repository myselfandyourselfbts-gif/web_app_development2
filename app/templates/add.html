{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-primary text-white pt-3 pb-2">
                <h4 class="mb-0">新增讀書筆記</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('note.add') }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">書名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" required placeholder="請輸入書名（必填）"
                            value="{{ title_val|default('') }}">
                    </div>

                    <div class="mb-3">
                        <label for="rating" class="form-label fw-bold">給予書籍評分</label>
                        <select class="form-select" id="rating" name="rating">
                            <option value="5" {% if rating_val==5 %}selected{% endif %}>5 - 極力推薦</option>
                            <option value="4" {% if rating_val==4 %}selected{% endif %}>4 - 值得一看</option>
                            <option value="3" {% if rating_val==3 %}selected{% endif %}>3 - 普通，沒有特別感覺</option>
                            <option value="2" {% if rating_val==2 %}selected{% endif %}>2 - 不太推薦</option>
                            <option value="1" {% if rating_val==1 %}selected{% endif %}>1 - 差強人意，不喜歡</option>
                            <option value="0" {% if rating_val==0 %}selected{% endif %}>無 - 尚未評分或不想給分</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="content" class="form-label fw-bold">閱讀心得</label>
                        <textarea class="form-control" id="content" name="content" rows="6"
                            placeholder="趁著記憶猶新，記錄一下這本書帶給你的啟發...">{{ content_val|default('') }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="{{ url_for('note.index') }}" class="btn btn-outline-secondary">取消並返回</a>
                        <button type="submit" class="btn btn-primary px-4 fw-bold">儲存筆記</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
